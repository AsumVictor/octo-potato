<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
		<title>Issue Logistics</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="mobile-web-app-capable" content="yes" />
		<style type="text/css">
			html { height: 100%; }
			body {
				height: 100%;
				margin: 0;
				background: black;
				color: white;
				overflow: hidden;
				-webkit-tap-highlight-color: rgba(0,0,0,0);
			}
			::-webkit-scrollbar { background-color: rgba(0,0,0,0.5); width: 0.75em; height: 0.75em; }
			::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.5); }
		</style>
	</head>
	<body>
		<!-- Pano2VR-generated player — do not edit these two lines -->
		<script type="text/javascript" src="pano2vr_player.js?ts=81890874"></script>
		<script type="text/javascript" src="skin.js?ts=81890874"></script>

		<div id="container" style="width:100%;height:100%;overflow:hidden;">
			<br>Loading...<br><br>
		</div>

		<!-- Pano2VR-generated init block — do not edit -->
		<script type="text/javascript">
		function parseParams(paramsString, params) {
			paramsString = paramsString.substring(1);
			var firstSeparatorPos = paramsString.indexOf(",");
			if (firstSeparatorPos != -1) {
				params.startNode = paramsString.slice(0, firstSeparatorPos);
				var viewingParamsString = paramsString.slice(firstSeparatorPos + 1);
				var viewingParams = viewingParamsString.split(",");
				if (viewingParams.length >= 3) {
					var startView = {};
					startView["pan"]  = viewingParams[0];
					startView["tilt"] = viewingParams[1];
					startView["fov"]  = viewingParams[2];
					if (viewingParams.length >= 4) {
						startView["projection"] = viewingParams[3];
					}
					params.startView = startView;
				}
			} else {
				params.startNode = paramsString;
				params.startView = "";
			}
		}
		var params = {};
		parseParams(document.location.hash, params);
		var startNode = params.startNode;
		var startView = params.startView;
		if (("onhashchange" in window) && (!(/MSIE (\d+\.\d+);/.test(navigator.userAgent)))) {
			window.onhashchange = function () {
				parseParams(window.location.hash, params);
				pano.openNext('{' + params.startNode + '}', params.startView);
			};
		} else {
			var lastHash = window.location.hash;
			window.setInterval(function () {
				if (window.location.hash != lastHash) {
					lastHash = window.location.hash;
					parseParams(window.location.hash, params);
					pano.openNext('{' + params.startNode + '}', params.startView);
				}
			}, 100);
		}
		pano = new pano2vrPlayer("container");
		pano.startNode = startNode;
		pano.startView = startView;
		pano.setQueryParameter("ts=81890874");
		skin = new pano2vrSkin(pano);
		window.addEventListener("load", function () {
			pano.readConfigUrlAsync("pano.xml?ts=81890874");
		});
		if (window.navigator.userAgent.match(/Safari/i)) {
			function iosHfix() {
				window.scrollTo(0, 1);
				var container = document.getElementById("container");
				var oh = container.offsetHeight;
				document.documentElement.style.setProperty('height', '100vh');
				if (oh != container.offsetHeight) {
					container.style.setProperty('height', "100%");
				} else {
					container.style.setProperty('height', window.innerHeight + "px");
				}
				window.scrollTo(0, 0);
				pano.setViewerSize(container.offsetWidth, container.offsetHeight);
			}
			setTimeout(iosHfix, 0);
			setTimeout(iosHfix, 100);
			window.addEventListener("resize", function () {
				setTimeout(iosHfix, 0);
				setTimeout(iosHfix, 500);
				setTimeout(iosHfix, 1000);
				setTimeout(iosHfix, 2000);
			});
		}
		</script>

		<noscript><p><b>Please enable Javascript!</b></p></noscript>

		<!-- Environment variables (gitignored) -->
		<script src="env.js"></script>
		<!-- Supabase -->
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
		<!-- Core -->
		<script src="modules/core/EventBus.js"></script>
		<script src="modules/core/AppState.js"></script>
		<!-- Data -->
		<script src="modules/data/IssueTypes.js"></script>
		<script src="modules/data/SupabaseClient.js"></script>
		<script src="modules/data/LogisticsLoader.js"></script>
		<!-- UI -->
		<script src="modules/ui/IssueViewer.js"></script>
		<!-- Logistics boot -->
		<script src="modules/LogisticsApp.js"></script>
		<script>
			window.addEventListener('load', function () {
				Nav.LogisticsApp.boot();
			});
		</script>
	</body>
</html>
